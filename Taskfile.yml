# https://taskfile.dev

version: '3'

vars:
  APP_NAME: "taskmaster-api"

tasks:
  default:
    desc: Print help
    cmds:
      - task --list

  confirm:
    internal: true
    cmds:
      - |
        echo -n "Are you sure [y/N] "
        read ans
        [ "${ans:-N}" = "y" ]

  build:api:
    desc: Build application
    cmds:
      - go build -ldflags="-s" -o=./bin/{{.APP_NAME}} ./cmd/api

  db:migrations:new:
    desc : Create a new database migration (name required)
    requires:
      vars: [name]
    cmds:
      - echo "Creating migration files for {{.name}}..."
      - goose create -s -dir ./migrations/ {{.name}} sql

  db:migrations:up:
    desc: Apply all up database migrations
    deps: [confirm]
    cmds:
      - echo "Running up migrations..."
      - goose postgres {{.TASKMASTER_DB_DSN}} -dir ./migrations/ up
    vars:
      TASKMASTER_DB_DSN: '{{.TASKMASTER_DB_DSN | default "${TASKMASTER_DB_DSN}"}}'
